<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fresh Fade Barbershop</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #111;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .hero {
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
      url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438');
      background-size: cover;
      background-position: center;
      color: white;
      text-align: center;
      padding: 100px 20px;
    }

    .hero h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .btn {
      display: inline-block;
      padding: 12px 20px;
      background: white;
      color: black;
      text-decoration: none;
      font-weight: bold;
      margin-top: 15px;
      border-radius: 5px;
    }

    .section {
      padding: 50px 20px;
      text-align: center;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      width: 200px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 30px;
    }

    @media (max-width: 600px) {
      .cards {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>

<body>

<header>
  Fresh Fade Barbershop
</header>

<div class="hero">
  <h1>Premium Cuts. Clean Style.</h1>
  <p>Book your appointment today.</p>
  <a href="#" class="btn">Book Now</a>
</div>

<div class="section">
  <h2>Services</h2>
  <div class="cards">
    <div class="card">Haircut</div>
    <div class="card">Beard Trim</div>
    <div class="card">Lineup</div>
  </div>
</div>

<div class="section">
  <h2>About</h2>
  <p>We provide sharp, clean cuts in a modern, comfortable environment.</p>
</div>

<div class="section">
  <h2>Contact</h2>
  <p>Call or text: (123) 456-7890</p>
</div>

<footer>
  © 2026 Fresh Fade Barbershop
</footer>

</body>
</html>
